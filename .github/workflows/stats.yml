name: Update GitHub Stats

on:
  schedule:
    - cron: "0 0 * * *"   # every day at midnight UTC
  workflow_dispatch:        # manual trigger button in Actions tab

permissions:
  contents: write

jobs:
  generate-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create generated/ directory
        run: mkdir -p generated

      # ── Stats card ──────────────────────────────────────────────────────────
      - name: Download stats SVG
        run: |
          curl -s \
            "https://github-readme-stats.vercel.app/api\
?username=dimasd-angga\
&show_icons=true\
&hide_border=true\
&bg_color=0a0a0a\
&title_color=f0f0f0\
&text_color=888888\
&icon_color=f0f0f0\
&count_private=true\
&cache_seconds=1" \
            -o generated/stats.svg
          # Verify it's an SVG (not an error HTML page)
          head -1 generated/stats.svg | grep -q "<svg" || (echo "Stats SVG invalid" && cat generated/stats.svg && exit 1)

      # ── Top langs card ───────────────────────────────────────────────────────
      - name: Download langs SVG
        run: |
          curl -s \
            "https://github-readme-stats.vercel.app/api/top-langs\
?username=dimasd-angga\
&layout=compact\
&hide_border=true\
&bg_color=0a0a0a\
&title_color=f0f0f0\
&text_color=888888\
&langs_count=8\
&cache_seconds=1" \
            -o generated/langs.svg
          head -1 generated/langs.svg | grep -q "<svg" || (echo "Langs SVG invalid" && cat generated/langs.svg && exit 1)

      # ── Commit if changed ────────────────────────────────────────────────────
      - name: Commit updated SVGs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add generated/stats.svg generated/langs.svg
          git diff --staged --quiet || git commit -m "chore: refresh GitHub stats [skip ci]"
          git push
