name: Update GitHub Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create generated/ directory
        run: mkdir -p generated

      # lowlighter/metrics runs fully inside GitHub Actions — no external service
      # It commits generated/stats.svg directly via the token
      # Docs: https://github.com/lowlighter/metrics
      - name: Generate metrics SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: dimasd-angga
          filename: generated/stats.svg

          # Commit settings — let the action handle the commit itself
          committer_token: ${{ secrets.METRICS_TOKEN }}
          committer_message: "chore: refresh metrics [skip ci]"
          committer_branch: main

          # Layout
          base: header, activity, community, repositories
          base_indepth: yes
          config_display: columns

          # Languages plugin
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_details: percentage
          plugin_languages_indepth: yes
          plugin_languages_sections: most-used

          # Contribution calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year