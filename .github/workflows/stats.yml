name: Update GitHub Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create generated/ directory
        run: mkdir -p generated

      # Uses lowlighter/metrics — runs 100% in GitHub Actions, no external service needed
      # Docs: https://github.com/lowlighter/metrics
      - name: Generate stats metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: dimasd-angga
          filename: generated/stats.svg

          # Base config
          base: header, activity, community, repositories
          base_indepth: yes

          # Styling — matches brutalist dark theme
          config_display: columns
          config_padding: 0, 8px
          config_animations: yes

          # Plugins
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_details: percentage
          plugin_languages_indepth: yes
          plugin_languages_sections: most-used

          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

      - name: Commit updated SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add generated/stats.svg
          git diff --staged --quiet || git commit -m "chore: refresh metrics [skip ci]"
          git push